# D11-api-contract-generator — REST API Contracts
# Step 11 in 24-step pipeline. Phase D (Data & Build-Facing).
# Reads ARCH (03) + DATA-MODEL (10) + PRD (02) + MCP-TOOL-SPEC (08)
#   + DESIGN-SPEC (09) + INTERACTION-MAP (07).
# In Full-Stack-First, REST API serves DUAL role:
#   1. Wraps MCP tools for non-AI consumers (Q-049 parity)
#   2. Feeds dashboard screens with data

identity:
  id: D11-api-contract-generator
  name: API Contract Generator
  version: "1.0.0"
  description: "Generates REST API contracts — endpoints that wrap MCP tools AND feed dashboard screens, standard response envelopes, auth strategy, MCP parity table, dashboard feed table, WebSocket channels, error codes matching MCP, and rate limiting"
  owner: platform-team
  phase: design
  extends: co-pilot
  mixins: []
  tags: [api, rest, contracts, endpoints, openapi, websocket, parity]

foundation_model:
  tier: balanced
  provider: null
  temperature: 0.1
  max_tokens: 8192

perception:
  trigger: api
  input_schema:
    type: object
    required: [project_name, interactions, data_shapes, tables]
    properties:
      project_name:
        type: string
      interactions:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            mcp_tool:
              type: string
            dashboard_screen:
              type: string
            shared_service:
              type: string
        description: "Interactions from INTERACTION-MAP"
      data_shapes:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            fields:
              type: array
              items:
                type: string
        description: "Data shapes from INTERACTION-MAP"
      tables:
        type: array
        items:
          type: string
        description: "Database tables from DATA-MODEL"
      mcp_tools:
        type: array
        items:
          type: string
        description: "MCP tool names to wrap as REST endpoints"
      dashboard_screens:
        type: array
        items:
          type: string
        description: "Dashboard screens that consume REST endpoints"
      personas:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            primary_interface:
              type: string

memory:
  working: session_context
  episodic: audit_events_table
  semantic: exception_catalog

planning:
  strategy: sequential
  max_steps: 10
  dry_run_supported: true

tools:
  allowed: [Read, Glob, Grep]
  custom: []

output:
  schema_ref: schema/contracts/api-contracts-v1.json
  channels: [stdout]
  writes_to: api_contracts

safety:
  autonomy_tier: T2
  max_budget_usd: 1.00
  audit_logging: true
  pii_scanning: true
  hitl:
    enabled: true
    trigger: on_breaking_change

observability:
  metrics_enabled: true
  log_level: INFO
  alert_rules:
    - condition: cost_usd > 0.80
      action: slack_alert

maturity:
  current_level: apprentice
  max_maturity: expert
  promotion_criteria:
    override_rate_below: 0.05
    confidence_above: 0.90
    consecutive_days: 21

testing:
  golden_tests: tests/golden/
  adversarial_tests: tests/adversarial/
  min_coverage: 0.90

compliance:
  data_inventory:
    reads: [arch_doc, data_model, prd_doc, mcp_tool_spec, design_spec, interaction_map]
    writes: [audit_trail, api_contracts]
  regulations: []
