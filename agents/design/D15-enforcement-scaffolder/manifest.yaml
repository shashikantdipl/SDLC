# D15-enforcement-scaffolder — .claude/ Enforcement Layer
# Step 15 in 24-step pipeline. Last doc in Phase D.
# Reads CLAUDE (14) + ARCH (03) + QUALITY (05) + SECURITY-ARCH (06).
# Generates EXECUTABLE .claude/ files — settings.json, rule files, skill commands.
# Upgraded in v2: prompt versioning rules + API governance rules.

identity:
  id: D15-enforcement-scaffolder
  name: Enforcement Scaffolder
  version: "2.0.0"
  description: "Generates the .claude/ enforcement layer — settings.json with hooks, domain-specific rule files activated by glob patterns, skill commands for scaffolding (/new-interaction, /new-mcp-tool, /new-agent), .cursorrules, prompt versioning rules, and API governance rules"
  owner: platform-team
  phase: design
  extends: co-pilot
  mixins: []
  tags: [enforcement, rules, skills, claude, hooks, scaffolding, cursorrules]

foundation_model:
  tier: balanced
  provider: null
  temperature: 0.1
  max_tokens: 8192

perception:
  trigger: api
  input_schema:
    type: object
    required: [project_name, coding_rules, architecture]
    properties:
      project_name:
        type: string
      coding_rules:
        type: object
        description: "Language rules, forbidden patterns from CLAUDE.md (Doc 14)"
        properties:
          languages:
            type: array
            items:
              type: string
          forbidden_patterns:
            type: array
            items:
              type: string
          implementation_patterns:
            type: array
            items:
              type: string
      architecture:
        type: object
        description: "Components from ARCH (Doc 03) — which directories need which rules"
        properties:
          mcp_servers:
            type: array
            items:
              type: string
          services:
            type: array
            items:
              type: string
          api_routes:
            type: string
          dashboard:
            type: string
          agents_dir:
            type: string
      quality_thresholds:
        type: object
        description: "Coverage thresholds from QUALITY (Doc 05)"
      security_rules:
        type: array
        items:
          type: string
        description: "Security enforcement rules from SECURITY-ARCH (Doc 06)"

memory:
  working: session_context
  episodic: audit_events_table
  semantic: exception_catalog

planning:
  strategy: sequential
  max_steps: 8
  dry_run_supported: true

tools:
  allowed: [Read, Glob, Grep, Edit, Write]
  custom: []

output:
  schema_ref: schema/contracts/enforcement-scaffold-v1.json
  channels: [stdout]
  writes_to: enforcement_rules

safety:
  autonomy_tier: T2
  max_budget_usd: 0.80
  audit_logging: true
  pii_scanning: true
  hitl:
    enabled: true
    trigger: on_settings_change

observability:
  metrics_enabled: true
  log_level: INFO
  alert_rules:
    - condition: cost_usd > 0.60
      action: slack_alert

maturity:
  current_level: apprentice
  max_maturity: expert
  promotion_criteria:
    override_rate_below: 0.05
    confidence_above: 0.90
    consecutive_days: 21

testing:
  golden_tests: tests/golden/
  adversarial_tests: tests/adversarial/
  min_coverage: 0.90

compliance:
  data_inventory:
    reads: [claude_doc, arch_doc, quality_doc, security_arch]
    writes: [audit_trail, enforcement_rules]
  regulations: []
