# D17-migration-planner — Migration Plan
# Step 17 in 24-step pipeline. Phase E. PARALLEL with D18 (TESTING).
# Reads DATA-MODEL (10) + ARCH (03) + PRD (02) + SECURITY-ARCH (06) + BRD (00).
# Defines how data and processes move from legacy to new platform.

identity:
  id: D17-migration-planner
  name: Migration Planner
  version: "1.0.0"
  description: "Generates migration plans — source system profile, phased migration approach, source-to-target mapping with transformation rules, data volume estimates, validation plan (row count + constraint + business rule), time-boxed cutover runbook, rollback criteria, parallel run strategy, dry run schedule, and legacy decommission plan"
  owner: platform-team
  phase: design
  extends: co-pilot
  mixins: []
  tags: [migration, cutover, data-migration, rollback, validation, decommission]

foundation_model:
  tier: balanced
  provider: null
  temperature: 0.1
  max_tokens: 8192

perception:
  trigger: api
  input_schema:
    type: object
    required: [project_name, source_systems, target_tables]
    properties:
      project_name:
        type: string
      source_systems:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            technology:
              type: string
            data_volume:
              type: string
            pain_points:
              type: array
              items:
                type: string
        description: "Legacy systems from BRD current state assessment"
      target_tables:
        type: array
        items:
          type: string
        description: "Target database tables from DATA-MODEL"
      data_entities:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            source:
              type: string
            sensitivity:
              type: string
            volume:
              type: string
        description: "Data entities with volume and sensitivity"
      constraints:
        type: object
        description: "Migration constraints (downtime tolerance, timeline)"
      security_classification:
        type: array
        items:
          type: string
        description: "Data classification rules from SECURITY-ARCH"

memory:
  working: session_context
  episodic: audit_events_table
  semantic: exception_catalog

planning:
  strategy: sequential
  max_steps: 10
  dry_run_supported: true

tools:
  allowed: [Read, Glob, Grep]
  custom: []

output:
  schema_ref: schema/contracts/migration-plan-v1.json
  channels: [stdout]
  writes_to: migration_plan

safety:
  autonomy_tier: T3
  max_budget_usd: 1.00
  audit_logging: true
  pii_scanning: true
  hitl:
    enabled: true
    trigger: always

observability:
  metrics_enabled: true
  log_level: INFO
  alert_rules:
    - condition: cost_usd > 0.80
      action: slack_alert

maturity:
  current_level: apprentice
  max_maturity: expert
  promotion_criteria:
    override_rate_below: 0.05
    confidence_above: 0.90
    consecutive_days: 21

testing:
  golden_tests: tests/golden/
  adversarial_tests: tests/adversarial/
  min_coverage: 0.90

compliance:
  data_inventory:
    reads: [data_model, arch_doc, prd_doc, security_arch, brd_doc]
    writes: [audit_trail, migration_plan]
  regulations: []
