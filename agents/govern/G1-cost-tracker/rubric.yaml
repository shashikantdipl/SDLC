# G1-cost-tracker quality evaluation rubric
dimensions:
  completeness:
    weight: 0.25
    criteria:
      - "summary section present with all required fields"
      - "breakdown section present (if requested)"
      - "alerts section present"
      - "recommendations section present with 1-3 items"

  accuracy:
    weight: 0.35
    criteria:
      - "total_cost_usd matches sum of cost_data"
      - "utilization_pct calculated correctly from total/budget"
      - "breakdown percentages sum to 100"
      - "trend direction is correct (up if current > previous)"

  format:
    weight: 0.20
    criteria:
      - "output is valid JSON"
      - "all dollar amounts have 6 decimal places"
      - "utilization_pct is 0-100+ range"
      - "breakdown sorted by cost descending"

  actionability:
    weight: 0.20
    criteria:
      - "recommendations are specific (not generic advice)"
      - "alerts identify specific agents exceeding thresholds"
      - "report can be consumed by dashboard without transformation"

pass_threshold: 0.85
