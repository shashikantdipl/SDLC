# O3-oncall-summarizer — On-Call Summarizer Agent
# OPERATE phase. Generates shift handoff summaries for incoming on-call.
# Uses fast tier — aggregation and summarization, not deep reasoning.

identity:
  id: O3-oncall-summarizer
  name: On-Call Summarizer
  version: "1.0.0"
  description: "Generates on-call shift summaries — aggregates incidents, alerts, actions taken, unresolved issues, and handoff notes for the next shift"
  owner: platform-team
  phase: operate
  extends: ops-agent
  mixins: []
  tags: [oncall, summary, handoff, shift, ops]

foundation_model:
  tier: fast
  provider: null
  temperature: 0.1
  max_tokens: 4096

perception:
  trigger: api
  input_schema:
    type: object
    required: [shift_period, incidents, alerts]
    properties:
      shift_period:
        type: object
        description: "Time range for this on-call shift"
        properties:
          start:
            type: string
            format: date-time
          end:
            type: string
            format: date-time
          engineer:
            type: string
            description: "Name of the on-call engineer for this shift"
      incidents:
        type: array
        description: "All incidents during the shift"
        items:
          type: object
          properties:
            id:
              type: string
            severity:
              type: string
            title:
              type: string
            status:
              type: string
              description: "resolved, ongoing, escalated"
            resolution:
              type: string
            opened_at:
              type: string
              format: date-time
            resolved_at:
              type: string
              format: date-time
            duration_minutes:
              type: number
      alerts:
        type: array
        description: "All alerts fired during the shift"
        items:
          type: object
          properties:
            source:
              type: string
            severity:
              type: string
            message:
              type: string
            timestamp:
              type: string
              format: date-time
            acknowledged:
              type: boolean
            false_positive:
              type: boolean
      actions_taken:
        type: array
        description: "Actions performed by the on-call during the shift"
        items:
          type: object
          properties:
            timestamp:
              type: string
              format: date-time
            action:
              type: string
            incident_id:
              type: string
            result:
              type: string
      unresolved_issues:
        type: array
        description: "Issues still open at end of shift"
        items:
          type: object
          properties:
            id:
              type: string
            title:
              type: string
            severity:
              type: string
            context:
              type: string
            next_steps:
              type: string
      system_health_snapshot:
        type: object
        description: "Current health status of all components at shift end"
        properties:
          components:
            type: object
            description: "Map of component name to status (healthy/degraded/down)"
          overall_status:
            type: string

memory:
  working: session_context
  episodic: audit_events_table
  semantic: shift_history_catalog

planning:
  strategy: sequential
  max_steps: 4
  dry_run_supported: true

tools:
  allowed: [Read, Glob, Grep]
  custom: []

output:
  schema_ref: schema/contracts/oncall-summary-v1.json
  channels: [stdout]
  writes_to: oncall_summary

safety:
  autonomy_tier: T0
  max_budget_usd: 0.10
  audit_logging: true
  pii_scanning: false
  hitl:
    enabled: false
    trigger: never

observability:
  metrics_enabled: true
  log_level: INFO
  alert_rules:
    - condition: unresolved_count > 3
      action: slack_alert

maturity:
  current_level: apprentice
  max_maturity: expert
  promotion_criteria:
    override_rate_below: 0.02
    confidence_above: 0.95
    consecutive_days: 14

testing:
  golden_tests: tests/golden/
  adversarial_tests: tests/adversarial/
  min_coverage: 0.90

compliance:
  data_inventory:
    reads: [incidents, alerts, actions_taken, unresolved_issues, system_health_snapshot]
    writes: [audit_trail, oncall_summary]
  regulations: []
