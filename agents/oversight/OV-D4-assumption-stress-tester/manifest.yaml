# OV-D4-assumption-stress-tester — Assumption Stress Test Agent
# OVERSIGHT phase. Stress-tests project assumptions against evidence.
# Uses balanced tier — needs reasoning about risk and impact modeling.

identity:
  id: OV-D4-assumption-stress-tester
  name: Assumption Stress Tester
  version: "1.0.0"
  description: "Stress-tests project assumptions — validates BRD assumptions against evidence, identifies high-risk unvalidated assumptions, and models what happens if key assumptions are wrong"
  owner: platform-team
  phase: oversight
  extends: reviewer
  mixins: []
  tags: [oversight, assumptions, stress-test, risk, brd, validation, impact]

foundation_model:
  tier: balanced
  provider: null
  temperature: 0.0
  max_tokens: 4096

perception:
  trigger: api
  input_schema:
    type: object
    required: [assumptions, evidence, constraints]
    properties:
      assumptions:
        type: array
        items:
          type: object
          required: [id, text, source]
          properties:
            id:
              type: string
              description: "Assumption identifier (e.g., A-001)"
            text:
              type: string
              description: "The assumption statement"
            source:
              type: string
              description: "Document where assumption was stated (e.g., BRD section 3.2)"
            category:
              type: string
              enum: [market, technical, resource, regulatory, user-behavior, integration]
              description: "Classification of the assumption"
        description: "Project assumptions extracted from BRD and related documents"
      evidence:
        type: object
        description: "Available data that may validate or contradict assumptions"
        properties:
          market_data:
            type: array
            items:
              type: object
              properties:
                claim:
                  type: string
                source:
                  type: string
                date:
                  type: string
          technical_benchmarks:
            type: array
            items:
              type: object
              properties:
                metric:
                  type: string
                value:
                  type: string
                source:
                  type: string
          user_research:
            type: array
            items:
              type: object
              properties:
                finding:
                  type: string
                sample_size:
                  type: integer
                confidence:
                  type: string
      constraints:
        type: object
        description: "Project constraints that assumptions must operate within"
        properties:
          budget:
            type: string
          timeline:
            type: string
          team_size:
            type: integer
          technology_stack:
            type: array
            items:
              type: string

memory:
  working: session_context
  episodic: audit_events_table
  semantic: assumption_history_catalog

planning:
  strategy: sequential
  max_steps: 8
  dry_run_supported: true

tools:
  allowed: [Read, Glob, Grep]
  custom: []

output:
  schema_ref: schema/contracts/stress-report-v1.json
  channels: [stdout]
  writes_to: stress_report

safety:
  autonomy_tier: T1
  max_budget_usd: 0.10
  audit_logging: true
  pii_scanning: false
  hitl:
    enabled: true
    trigger: on_high_risk_finding

observability:
  metrics_enabled: true
  log_level: INFO
  alert_rules:
    - condition: high_risk_count > 0
      action: slack_alert

maturity:
  current_level: apprentice
  max_maturity: expert
  promotion_criteria:
    override_rate_below: 0.02
    confidence_above: 0.95
    consecutive_days: 14

testing:
  golden_tests: tests/golden/
  adversarial_tests: tests/adversarial/
  min_coverage: 0.90

compliance:
  data_inventory:
    reads: [brd, market_data, technical_benchmarks, user_research]
    writes: [audit_trail, stress_report]
  regulations: []
